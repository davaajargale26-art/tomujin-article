<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tomujin Article нийтлэлийн сайт" />
    <title>Tomujin Article</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="/" aria-label="Tomujin Article home">
          <span class="brand-mark">T</span>
          <span class="brand-word">
            <strong>TOMUJIN</strong>
            <small>ARTICLE</small>
          </span>
        </a>

        <div class="category-area">
          <span>Ангилал</span>
          <nav class="main-nav" id="categoryNav" aria-label="Article categories"></nav>
        </div>

        <div class="header-actions">
          <form class="header-search" id="headerSearchForm">
            <input id="headerSearchInput" type="search" placeholder="Нийтлэл хайх" />
            <button type="submit" aria-label="Хайх">Search</button>
          </form>
          <a class="submit-button" id="showAddArticle" href="#addArticle">Нийтлэл нэмэх</a>
        </div>
      </div>
    </header>

    <main id="app"></main>

    <template id="homeTemplate">
      <section class="hero">
        <img class="hero-image" src="/images/stagknight.jpg" alt="" />
        <div class="hero-overlay">
          <span class="eyebrow">Tomujin / Editorial</span>
          <h1>TOMUJIN ARTICLE</h1>
          <p>Сурагчдын бичсэн нийтлэл, бодол, тэмдэглэлийг нэг дор цэгцтэй унших орчин.</p>
          <a href="#news">Нийтлэлүүд</a>
        </div>
      </section>

      <section class="section" id="news">
        <div class="section-heading">
          <span>Latest</span>
          <h2>Сүүлийн нийтлэлүүд</h2>
        </div>

        <p class="status" id="status"></p>
        <div class="post-grid" id="articleGrid"></div>
      </section>

      <section class="publish-band" id="addArticle">
        <div class="publish-inner">
          <div class="section-heading align-left">
            <span>Publish</span>
            <h2>Шинэ нийтлэл</h2>
          </div>

          <form class="article-form" id="articleForm">
            <label>
              Гарчиг
              <input name="title" type="text" placeholder="Нийтлэлийн гарчиг" required />
            </label>
            <label>
              Зохиогч
              <input name="author" type="text" placeholder="Нэр" required />
            </label>
            <label>
              Ангилал
              <select name="categorySlug" id="articleCategory" required></select>
            </label>
            <label>
              Зургийн холбоос
              <input name="imageUrl" type="url" placeholder="/images/stagknight.jpg" />
            </label>
            <label class="wide">
              Товч
              <textarea name="excerpt" rows="3" placeholder="Нийтлэлийн богино тайлбар" required></textarea>
            </label>
            <label class="wide">
              Нийтлэл
              <textarea name="body" rows="9" placeholder="Энд бичнэ үү" required></textarea>
            </label>
            <div class="form-actions">
              <p id="formStatus"></p>
              <button type="submit">Нийтлэх</button>
            </div>
          </form>
        </div>
      </section>
    </template>

    <footer class="site-footer">
      <div class="footer-inner">
        <strong>TOMUJIN ARTICLE</strong>
        <span>2026 / Article-only learning project</span>
      </div>
      <button type="button" id="backTop">Top</button>
    </footer>
  </body>
</html>
